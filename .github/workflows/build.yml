name: Build XMRig (Linux x86_64 static)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make gcc g++ wget curl unzip libssl-dev libuv1-dev pkg-config

      - name: Download and build static libraries
        run: |
          # Build OpenSSL static
          cd $HOME
          curl -L https://www.openssl.org/source/openssl-3.2.1.tar.gz -o openssl.tar.gz
          tar -xzf openssl.tar.gz
          cd openssl-3.2.1
          ./Configure --prefix=$HOME/install linux-x86_64 no-shared no-dso
          make -j$(nproc)
          sudo make install_sw

          # Build libuv static
          cd $HOME
          if [ ! -d "libuv-1.48.0" ]; then
            curl -L https://github.com/libuv/libuv/archive/refs/tags/v1.48.0.tar.gz -o libuv.tar.gz
            tar -xzf libuv.tar.gz
          fi
          cd libuv-1.48.0
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/install -DCMAKE_BUILD_TYPE=Release -DLIBUV_BUILD_SHARED=OFF -DLIBUV_BUILD_TESTS=OFF
          make -j$(nproc)
          sudo make install

      - name: Configure CMake
        env:
          OPENSSL_DIR: $HOME/install
          LIBUV_DIR: $HOME/install
        run: |
          cmake . \
            -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DCMAKE_CXX_FLAGS="-I$HOME/install/include -static" \
            -DCMAKE_C_FLAGS="-I$HOME/install/include -static" \
            -DOPENSSL_ROOT_DIR=$HOME/install \
            -DOPENSSL_INCLUDE_DIR=$HOME/install/include \
            -DLIBUV_ROOT_DIR=$HOME/install \
            -DLIBUV_INCLUDE_DIR=$HOME/install/include \
            -DWITH_EMBEDDED_CONFIG=ON \
            -DWITH_STATIC=ON \
            -DWITH_HWLOC=OFF

      - name: Build XMRig
        run: |
          cmake --build build --target xmrig -- -j$(nproc) CFLAGS="-I$HOME/install/include" CXXFLAGS="-I$HOME/install/include" LDFLAGS="-L$HOME/install/lib -static"

      - name: Strip binary
        run: |
          strip -s build/xmrig 2>/dev/null || true

      - name: Verify static binary
        run: |
          file build/xmrig
          ldd build/xmrig 2>&1 | grep -v "not a dynamic executable" || echo "Static binary verified"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-linux-x86_64-static
          path: build/xmrig
          retention-days: 30

      - name: Upload release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/xmrig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}