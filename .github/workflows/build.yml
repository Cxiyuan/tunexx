name: Build XMRig (Linux x86_64 static)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build XMRig in Alpine container
        run: |
          docker buildx build \
            --load \
            --tag xmrig-musl:latest \
            --file Dockerfile.musl \
            --target builder \
            --build-arg BUILD_TYPE=release \
            .

      - name: Extract binary from container
        run: |
          docker create --name xmrig-extractor xmrig-musl:latest
          docker cp xmrig-extractor:/xmrig/build/xmrig ./xmrig-static
          docker rm xmrig-extractor
          chmod +x xmrig-static

      - name: Verify static binary
        run: |
          file xmrig-static
          echo "=== ldd output ==="
          ldd xmrig-static 2>&1 || true
          echo "=== Check libc ==="
          ldd xmrig-static 2>&1 | grep -E "musl|glibc|ldd" || echo "Static binary confirmed (no dynamic libc dependencies)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-linux-x86_64-musl-static
          path: xmrig-static
          retention-days: 30

      - name: Upload release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: xmrig-static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}