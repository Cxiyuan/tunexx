name: Build XMRig (Linux x86_64 static)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and extract static binary
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: xmrig-musl:latest
          push: false
          load: true
          build-args: |
            BUILD_TYPE=release
          targets: static
          file: Dockerfile.musl

      - name: Extract binary from container
        run: |
          docker create --name xmrig-extractor xmrig-musl:latest
          docker cp xmrig-extractor:/xmrig/build/xmrig ./xmrig-static
          docker rm xmrig-extractor

      - name: Verify static binary
        run: |
          file xmrig-static
          echo "=== ldd output ==="
          ldd xmrig-static 2>&1 || true
          echo "=== Check for musl ==="
          ldd xmrig-static 2>&1 | grep -i musl || echo "Using musl libc"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-linux-x86_64-musl-static
          path: xmrig-static
          retention-days: 30

      - name: Upload release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: xmrig-static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}